name: dltrs
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  cached_network_image: ^3.4.1
  equatable: ^2.0.8
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^21.0.0
  flutter_quill: ^11.5.0
  get_it: ^9.2.1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  logger: ^2.7.0
  path_provider: ^2.1.5
  pdf: ^3.12.0
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.5
  speech_to_text: ^7.3.0
  supabase_flutter: ^2.12.4
  table_calendar: ^3.2.0
  timezone: ^0.11.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/app_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_logo.png
  min_sdk_android: 21
